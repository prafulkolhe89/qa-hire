kind = "web"
previewPath = "/"
title = "QAHire – AI Job Curator"
version = "1.0.0"
id = "artifacts/qa-hire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23258

[services.development]
run = "pnpm --filter @workspace/qa-hire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qa-hire", "run", "build" ]
publicDir = "artifacts/qa-hire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23258"
BASE_PATH = "/"
